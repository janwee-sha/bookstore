services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bookstore-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"

  config:
    image: bookstore/config:local
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: bookstore-config
    environment:
      SPRING_PROFILES_ACTIVE: native
    ports:
      - "7000:7000"

  eureka:
    image: bookstore/eureka:local
    build:
      context: .
      dockerfile: eureka/Dockerfile
    container_name: bookstore-eureka
    depends_on:
      - config
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:7000"
    ports:
      - "7010:7010"

  authorization:
    image: bookstore/authorization:local
    build:
      context: .
      dockerfile: authorization/Dockerfile
    container_name: bookstore-authorization
    depends_on:
      - config
      - eureka
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:7000"
    ports:
      - "7030:7030"

  book:
    image: bookstore/book:local
    build:
      context: .
      dockerfile: book/Dockerfile
    container_name: bookstore-book
    depends_on:
      - config
      - eureka
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:7000"
    ports:
      - "7100:7100"

  order:
    image: bookstore/order:local
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: bookstore-order
    depends_on:
      - config
      - eureka
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:7000"
    ports:
      - "7120:7120"

  gateway:
    image: bookstore/gateway:local
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: bookstore-gateway
    depends_on:
      - config
      - eureka
      - authorization
      - book
      - order
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:7000"
      GITHUB_CLIENT_ID: replace-me
      GITHUB_CLIENT_SECRET: replace-me
    ports:
      - "7001:7001"
