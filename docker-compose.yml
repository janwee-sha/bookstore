services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bookstore-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  config:
    image: bookstore/config:local
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: bookstore-config
    environment:
      SPRING_PROFILES_ACTIVE: native
    ports:
      - "18080:18080"

  eureka:
    image: bookstore/eureka:local
    build:
      context: .
      dockerfile: eureka/Dockerfile
    container_name: bookstore-eureka
    depends_on:
      - config
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:18080"
    ports:
      - "18081:18081"

  authorization:
    image: bookstore/authorization:local
    build:
      context: .
      dockerfile: authorization/Dockerfile
    container_name: bookstore-authorization
    depends_on:
      - config
      - eureka
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:18080"
    ports:
      - "18083:18083"

  book:
    image: bookstore/book:local
    build:
      context: .
      dockerfile: book/Dockerfile
    container_name: bookstore-book
    depends_on:
      - config
      - eureka
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:18080"
    ports:
      - "18084:18084"

  order:
    image: bookstore/order:local
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: bookstore-order
    depends_on:
      - config
      - eureka
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:18080"
    ports:
      - "18085:18085"

  gateway:
    image: bookstore/gateway:local
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: bookstore-gateway
    depends_on:
      - config
      - eureka
      - authorization
      - book
      - order
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_SERVER_URL: "http://config:18080"
    ports:
      - "18082:18082"
