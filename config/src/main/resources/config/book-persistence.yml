spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/bookstore?currentSchema=book&useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&serverTimezone=Asia/Shanghai
    username: dev
    password: dev
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-test-query: "SELECT 1"
  jpa:
    database: postgresql
    properties:
      jakarta:
        persistence:
          sharedCache:
            mode: ENABLE_SELECTIVE # Enable @Cacheable annotation
      hibernate:
        cache:
          use_second_level_cache: false # Enable second-level cache
          region:
            factory_class: org.hibernate.cache.ehcache.EhCacheRegionFactory #Specifies the class to handle the second-level cache
        generate_statistics: true # Check whether the cache is applied
    show-sql: true
    generate-ddl: true