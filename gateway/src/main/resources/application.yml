server:
  port: 7001

spring:
  application:
    name: gateway
  profiles:
    default: local
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:7000}
  cloud:
    gateway:
      mvc:
        routes:
          - id: authorization
            uri: lb://authorization
            predicates:
              - Path=/authorization/**
            filters:
              - StripPrefix=1
          - id: book
            uri: lb://book
            predicates:
              - Path=/book/**
            filters:
              - StripPrefix=1
          - id: order
            uri: lb://order
            predicates:
              - Path=/order/**
            filters:
              - StripPrefix=1
  security:
    oauth2:
      client:
        registration:
          github:
            scope: user:read, user:write
          bookstore:
            provider: spring
            client-id: bookstore
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            scope: openid, user:read, user:write
            client-name: Spring

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true