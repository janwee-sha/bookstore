server:
  port: 7001

spring:
  application:
    name: gateway
  profiles:
    default: local
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:7000}
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  security:
    oauth2:
      client:
        registration:
          github:
            scope: user:read, user:write
          bookstore:
            provider: spring
            client-id: bookstore
            client-authentication-method: client_secret_basic
            authorization-grant-type: authorization_code
            scope: openid, user:read, user:write
            client-name: Spring

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true
