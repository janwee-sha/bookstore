server:
  port: 7030

spring:
  application:
    name: authorization
  profiles:
    default: local
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:7000}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  security:
    user:
      name: "admin@bookstore.com"
      roles:
        - "ADMIN"
    oauth2:
      authorizationserver:
        client:
          bookstore:
            registration:
              client-id: "bookstore"
              client-authentication-methods:
                - "client_secret_basic"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
                - "client_credentials"
              scopes:
                - "openid"
                - "user:read"
                - "user:write"
                - "book:read"
                - "book:write"
                - "order:read"
                - "order:write"
            require-authorization-consent: true
          bookstore-frontend:
            registration:
              client-id: "bookstore-frontend"
              client-authentication-methods:
                - "none"
              authorization-grant-types:
                - "authorization_code"
                - "refresh_token"
              redirect-uris:
                - "http://127.0.0.1:8088/authorized"
              post-logout-redirect-uris:
                - "http://127.0.0.1:8088/"
              scopes:
                - "openid"
                - "user:read"
                - "user:write"
                - "book:read"
                - "book:write"
                - "order:read"
                - "order:write"
            require-authorization-consent: true
            require-proof-key: true
          order-service:
            registration:
              client-id: "order-service"
              client-secret: "{bcrypt}$2a$10$RSfYVxaBOmgO9RyXATFthuCXEEoD3FrsJVdYut0PbjhH.dMKagvRm"
              client-authentication-methods:
                - "client_secret_basic"
              authorization-grant-types:
                - "client_credentials"
              scopes:
                - "book:read"

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
