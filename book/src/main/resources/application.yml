server:
  port: 18084

spring:
  application:
    name: book
  profiles:
    default: local
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18080}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  jpa:
    open-in-view: true
  cloud:
    stream:
      binders:
        boss:
          type: rabbit
      function:
        definition: stockReservationRejectedSupplier;stockReservationConfirmedSupplier;orderCreatedConsumer
      bindings:
        orderCreatedConsumer-in-0:
          destination: queue.order.created
        stockReservationRejectedSupplier-out-0:
          destination: queue.stock.reservation.rejected
          producer:
            confirm-ack-channel: queue.stock.reservation.rejected.confirm
        stockReservationConfirmedSupplier-out-0:
          destination: queue.stock.reservation.confirmed
          producer:
            confirm-ack-channel: queue.stock.reservation.confirmed.confirm

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
