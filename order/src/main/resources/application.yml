server:
  port: 18085

spring:
  application:
    name: order
  profiles:
    default: local
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:18080}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  jpa:
    open-in-view: true
  cloud:
    stream:
      binders:
        boss:
          type: rabbit
      function:
        definition: orderCreatedSupplier;stockReservationRejectedConsumer;stockReservationConfirmedConsumer
      bindings:
        stockReservationConfirmedConsumer-in-0:
          destination: queue.stock.reservation.confirmed
        stockReservationRejectedConsumer-in-0:
          destination: queue.stock.reservation.rejected
        orderCreatedSupplier-out-0:
          destination: queue.order.created

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
