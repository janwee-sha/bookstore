spring:
  application:
    name: order
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:18083/oauth2/jwks
      client:
        registration:
          order-service:
            provider: authorization-server
            client-id: order-service
            client-secret: order-service-secret
            authorization-grant-type: client_credentials
            scope: book:read
        provider:
          authorization-server:
            token-uri: http://localhost:18083/oauth2/token
  config:
    import: ""
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    stream:
      enabled: false
      bindings: { }
  datasource:
    url: jdbc:h2:mem:order-it;MODE=PostgreSQL;NON_KEYWORDS=ORDER;INIT=CREATE SCHEMA IF NOT EXISTS order;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: false

management:
  health:
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
