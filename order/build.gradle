 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'com.janwee.bookstore.java-conventions'
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter-web:2.3.12.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-client:2.2.9.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-config:2.2.8.RELEASE'
    api 'org.springframework.cloud:spring-cloud-stream:3.0.13.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-stream-rabbit:3.0.13.RELEASE'
    api 'org.springframework.boot:spring-boot-starter-data-jpa:2.3.12.RELEASE'
    api 'com.alibaba:druid-spring-boot-starter:1.2.11'
    api 'org.springframework.cloud:spring-cloud-starter-openfeign:2.2.9.RELEASE'
    api 'org.springdoc:springdoc-openapi-ui:1.6.8'
    api 'org.springdoc:springdoc-openapi-data-rest:1.6.8'
    runtimeOnly 'org.postgresql:postgresql:42.2.20'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:2.3.12.RELEASE'
    testImplementation 'org.springframework.cloud:spring-cloud-stream-test-support:3.0.13.RELEASE'
    compileOnly 'org.projectlombok:lombok:1.18.24'
}

description = 'order-server'
