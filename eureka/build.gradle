plugins {
    id 'com.janwee.bookstore.java-conventions'
}

dependencies {
    api 'org.springframework.boot:spring-boot-starter:2.3.12.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-netflix-eureka-server:2.2.9.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-config:2.2.8.RELEASE'
    api 'org.springframework.cloud:spring-cloud-starter-loadbalancer:2.2.9.RELEASE'
    testImplementation 'org.springframework.boot:spring-boot-starter-test:2.3.12.RELEASE'
}

description = 'Eureka Server'
